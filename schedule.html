<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,viewport-fit=cover">
<title>일정 앱</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F7F6F2;--sf:#FFF;--sf2:#F0EFE9;--bd:#E8E6DF;--tx:#3C3A35;--tx2:#8A887F;--tx3:#B5B3AB;--acc:#5C6B5A;--accl:#E8EDE7}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);min-height:100vh}
.ph{max-width:390px;margin:0 auto;background:var(--bg);min-height:100vh;display:flex;flex-direction:column}
.hdr{padding:16px 18px 0;background:var(--sf)}
.hdr h1{font-size:21px;font-weight:500;color:var(--tx)}
.dsub{font-size:12px;color:var(--tx2);margin-top:1px}
.tabs{display:flex;border-bottom:1px solid var(--bd);margin-top:12px}
.tab{flex:1;text-align:center;padding:9px 4px;font-size:13px;color:var(--tx2);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap}
.tab.active{color:var(--tx);border-bottom-color:var(--acc);font-weight:500}
.cnt{flex:1;overflow-y:auto;padding-bottom:80px}
.abtn{width:28px;height:28px;border-radius:50%;background:var(--acc);border:none;cursor:pointer;color:#fff;font-size:17px;display:flex;align-items:center;justify-content:center;flex-shrink:0;line-height:1}
.card{background:var(--sf);border-radius:14px;padding:14px;margin-bottom:8px}
.stl{font-size:13px;font-weight:500;color:var(--tx);margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.leg{display:flex;flex-wrap:wrap;gap:6px}
.legit{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--tx2)}
.legd{width:7px;height:7px;border-radius:50%}
/* MONTHLY */
.cwrap{background:var(--sf);margin:10px;border-radius:14px;padding:12px}
.cnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.cnav span{font-size:14px;font-weight:500;color:var(--tx)}
.cnav button{background:none;border:none;cursor:pointer;font-size:17px;color:var(--tx2);padding:2px 5px}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px}
.cdow{text-align:center;font-size:10px;color:var(--tx2);padding:2px 0}
.cday{text-align:center;padding:2px 1px;font-size:12px;cursor:pointer;min-height:40px}
.dn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;margin:0 auto;color:var(--tx)}
.cday.today .dn{background:var(--acc);color:#fff}
.cday.sel:not(.today) .dn{background:var(--sf2)}
.cday.oth .dn{color:var(--tx3)}
.epills{display:flex;flex-direction:column;gap:1px;margin-top:1px}
.pill{font-size:9px;border-radius:3px;padding:1px 3px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sdb{background:var(--sf);margin:0 10px 10px;border-radius:14px;padding:12px}
.sdtl{font-size:13px;font-weight:500;color:var(--tx);display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.evit{display:flex;align-items:center;gap:8px;padding:6px 0;border-top:0.5px solid var(--bd)}
/* WEEKLY */
.wksec{margin:10px}
.wstrip{background:var(--sf);border-radius:12px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.wstrip span{font-size:13px;font-weight:500;color:var(--tx)}
.wstrip button{background:none;border:none;cursor:pointer;font-size:16px;color:var(--tx2)}
.goal-ratio-bar{display:flex;height:18px;border-radius:9px;overflow:hidden;margin-bottom:6px;gap:1px}
.goal-seg{height:100%;display:flex;align-items:center;justify-content:center;min-width:0;overflow:hidden}
.goal-seg-label{font-size:9px;color:#fff;font-weight:500;white-space:nowrap;padding:0 4px;overflow:hidden;text-overflow:ellipsis}
.goal-seg-label.dark{color:rgba(0,0,0,0.55)}
/* ℹ 버튼 */
.info-btn{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--tx3);background:none;cursor:pointer;font-size:10px;color:var(--tx2);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;font-style:italic;font-weight:600;line-height:1}
.info-popup{background:var(--sf);border:0.5px solid var(--bd);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.12);padding:12px 14px;margin-top:8px;font-size:12px;color:var(--tx2);line-height:1.6;display:none}
.info-popup.open{display:block}
.btbl{width:100%;border-collapse:collapse;table-layout:fixed}
.btbl th{font-size:10px;color:var(--tx2);text-align:center;padding:2px 1px;font-weight:400}
.btbl td{vertical-align:top;padding:1px}
.cnc{font-size:10px;color:var(--tx2);padding:2px 2px 2px 0;vertical-align:top;width:30px;word-break:keep-all;line-height:1.3;white-space:nowrap;overflow:hidden}
.cds{width:5px;height:5px;border-radius:50%;display:inline-block;vertical-align:middle;margin-top:-1px;margin-right:1px}
.bchip{border-radius:4px;padding:2px 3px;font-size:10px;display:inline-flex;align-items:center;gap:1px;margin-bottom:1px;width:100%}
.bchip .bx{font-size:9px;cursor:pointer;opacity:.4;flex-shrink:0;margin-left:auto}
.tbl-add{font-size:11px;color:var(--tx2);cursor:pointer;border:0.5px dashed var(--bd);border-radius:6px;padding:5px 8px;text-align:center;margin-top:6px;display:block}
.slrow{display:flex;align-items:center;gap:8px;padding:4px 0}
.sld{font-size:12px;color:var(--tx2);width:16px}
.slbw{flex:1;height:7px;background:var(--sf2);border-radius:4px;overflow:hidden}
.slbf{height:100%;background:var(--acc);border-radius:4px}
.sli{font-size:10px;color:var(--tx2);min-width:90px;text-align:right;cursor:pointer}
/* DAILY */
.wnb{background:var(--sf);display:flex;align-items:center;justify-content:space-between;padding:12px 16px 4px}
.wnb span{font-size:13px;font-weight:500;color:var(--tx)}
.wnb button{background:none;border:none;cursor:pointer;font-size:16px;color:var(--tx2)}
.dps{display:flex;padding:6px 10px 10px;gap:2px;background:var(--sf)}
.dp{flex:1;text-align:center;padding:5px 2px;font-size:10px;color:var(--tx2);cursor:pointer;border-radius:10px}
.dp.active{background:var(--acc);color:#fff}
.dp .dn2{font-size:13px;font-weight:500;display:block}
.cbs{background:var(--sf);margin:0 10px 4px;border-radius:12px;padding:9px 13px}
.cbsl{font-size:10px;color:var(--tx2);margin-bottom:5px}
.urb{display:flex;height:8px;border-radius:4px;overflow:hidden;margin-bottom:4px}
.tsec{background:var(--sf);margin:0 10px 6px;border-radius:12px;padding:11px 13px}
.tit{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:0.5px solid var(--bd)}
.chk{width:17px;height:17px;border-radius:4px;border:1.5px solid var(--tx3);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;background:transparent;transition:all .15s;user-select:none}
.chk.done{background:var(--acc);border-color:var(--acc)}
/* timeline - 높이 비례 */
.tlog{background:var(--sf);margin:0 10px 6px;border-radius:12px;padding:11px 13px}
.tl-wrap{position:relative;padding-left:44px}
.tl-hour{position:relative;height:52px}
.tl-hour-label{position:absolute;left:-44px;top:-6px;font-size:10px;color:var(--tx3);width:36px;text-align:right}
.tl-hour-line{position:absolute;left:0;top:0;right:0;height:0.5px;background:var(--bd)}
.tl-ev{position:absolute;border-radius:5px;padding:4px 8px;display:flex;align-items:center;overflow:hidden;min-height:20px}
.tl-ev-main{flex:1;min-width:0}
.tl-ev-name{font-size:11px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tl-ev-time{font-size:10px;opacity:.65}
/* 점 세 개 */
.kw{position:relative;flex-shrink:0}
.kdot{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:none;border:none;cursor:pointer;padding:3px 5px;line-height:1}
.kdot i{display:block;width:3px;height:3px;border-radius:50%;background:var(--tx3);transition:background .15s}
.kdot:hover i{background:var(--tx2)}
.km{position:absolute;right:0;top:22px;background:var(--sf);border:0.5px solid var(--bd);border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:50;min-width:80px;overflow:hidden;display:none}
.km.open{display:block}
.km button{display:block;width:100%;padding:9px 14px;font-size:12px;color:var(--tx);background:none;border:none;cursor:pointer;text-align:left}
.km button:hover{background:var(--sf2)}
.km button.red{color:#c0392b}
/* ROUTINE */
.rsec{margin:10px}
.pct-row{display:flex;align-items:center;gap:10px}
.pct-num{font-size:18px;font-weight:500;color:var(--tx);min-width:42px}
.pct-bar-wrap{flex:1;height:6px;background:var(--sf2);border-radius:3px;overflow:hidden}
.pct-bar{height:100%;background:var(--acc);border-radius:3px;transition:width .3s}
.pct-sub{font-size:11px;color:var(--tx2);min-width:32px;text-align:right}
.rtog{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--tx3);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;background:transparent;transition:all .2s;line-height:1}
.rtog.on{background:var(--acc);border-color:var(--acc);color:#fff}
.rrow{display:flex;align-items:center;padding:9px 0;border-bottom:0.5px solid var(--bd)}
.rrow:last-child{border-bottom:none}
.rn{font-size:13px;color:var(--tx)}
.rd{font-size:10px;color:var(--tx2);margin-top:1px}
.rcg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.rcdow{font-size:9px;color:var(--tx2);text-align:center;padding:2px 0;font-weight:500}
.rcc{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto}
/* MODAL */
.mover{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(60,58,53,.3);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.modal{background:var(--sf);border-radius:20px 20px 0 0;padding:18px;width:100%;max-width:390px;max-height:88vh;overflow-y:auto}
.mhdl{width:32px;height:4px;background:var(--bd);border-radius:2px;margin:0 auto 12px}
.mtl{font-size:15px;font-weight:500;color:var(--tx);margin-bottom:12px}
.flbl{font-size:12px;color:var(--tx2);margin-bottom:3px;display:block}
/* 입력 폼 - font-size 16px로 모바일 확대 방지 */
.fi{width:100%;border:1px solid var(--bd);border-radius:8px;padding:9px 12px;font-size:14px;color:var(--tx);background:var(--bg);outline:none;margin-bottom:8px;box-sizing:border-box}
.fi:focus{border-color:var(--tx2)}
input[type="time"].fi,input[type="date"].fi{font-size:14px;height:42px;-webkit-appearance:none;appearance:none}
.fr{display:flex;flex-direction:column;gap:7px;margin-bottom:8px}
.fr>div{display:flex;flex-direction:column}
.cg{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.ch{padding:5px 10px;border-radius:20px;font-size:12px;cursor:pointer;border:1px solid var(--bd);color:var(--tx2);background:var(--bg)}
.ch.active{background:var(--acc);color:#fff;border-color:var(--acc)}
.mbr{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:8px}
.bc{padding:10px;border-radius:9px;border:1px solid var(--bd);background:none;font-size:14px;cursor:pointer;color:var(--tx2);height:44px}
.bs{padding:10px;border-radius:9px;border:none;background:var(--acc);color:#fff;font-size:14px;cursor:pointer;font-weight:500;height:44px}
.hidden{display:none!important}
.cer{display:grid;grid-template-columns:20px 1fr 72px 20px;gap:6px;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--bd)}
.csw{width:20px;height:20px;border-radius:50%;border:none;cursor:pointer;padding:0}
.cni{border:none;background:none;font-size:13px;color:var(--tx);outline:none;width:100%}
.chw{display:flex;align-items:center;gap:3px}
.chn{width:56px;border:1px solid var(--bd);border-radius:6px;padding:3px 6px;font-size:12px;color:var(--tx);background:var(--bg);text-align:center;outline:none}
.dlb{background:none;border:none;cursor:pointer;font-size:13px;color:var(--tx3);padding:0}
.rtbr{display:flex;gap:7px;margin-bottom:10px}
.rtb{flex:1;padding:8px;border-radius:9px;border:1.5px solid var(--bd);background:none;font-size:12px;cursor:pointer;color:var(--tx2)}
.rtb.active{border-color:var(--acc);background:var(--accl);color:var(--acc);font-weight:500}
/* 수면 모달 특수 버튼 */
.sleep-special{display:flex;gap:7px;margin-bottom:10px}
.sleep-sp-btn{flex:1;padding:9px;border-radius:9px;border:1px solid var(--bd);background:none;font-size:12px;cursor:pointer;color:var(--tx2)}
.sleep-sp-btn.active{border-color:var(--acc);background:var(--accl);color:var(--acc);font-weight:500}
/* 확인 다이얼로그 */
.confirm-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:200}
.confirm-box{background:var(--sf);border-radius:16px;padding:20px;width:300px;max-width:90vw}
.confirm-title{font-size:15px;font-weight:500;color:var(--tx);margin-bottom:6px}
.confirm-msg{font-size:13px;color:var(--tx2);margin-bottom:16px;line-height:1.5}
.confirm-btns{display:flex;flex-direction:column;gap:7px}
.confirm-btns button{width:100%;padding:11px;border-radius:9px;border:none;font-size:13px;cursor:pointer}
.confirm-btns .cb-cancel{background:var(--sf2);color:var(--tx2)}
.confirm-btns .cb-one{background:var(--accl);color:var(--acc);font-weight:500}
.confirm-btns .cb-all{background:#faeaea;color:#c0392b;font-weight:500}
</style>
</head>
<body>
<div class="ph" id="app">
  <div class="hdr">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div><h1>일정</h1><div class="dsub" id="hdr-dsub"></div></div>
      <div style="display:flex;align-items:center;gap:6px;margin-top:5px">
        <button onclick="mBackup()" title="백업/복원" style="background:none;border:1px solid var(--bd);border-radius:8px;padding:5px 8px;cursor:pointer;color:var(--tx2);display:flex;align-items:center">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <button class="abtn" id="mab">+</button>
      </div>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="sw('monthly')">먼슬리</div>
      <div class="tab" onclick="sw('weekly')">주별</div>
      <div class="tab" onclick="sw('daily')">일일</div>
      <div class="tab" onclick="sw('routine')">루틴</div>
    </div>
  </div>
  <div class="cnt" id="cnt"></div>
</div>
<div class="mover hidden" id="mover" style="display:none"><div class="modal" id="mc"></div></div>
<div class="confirm-overlay hidden" id="conf-overlay" style="display:none">
  <div class="confirm-box">
    <div class="confirm-title" id="conf-title"></div>
    <div class="confirm-msg" id="conf-msg"></div>
    <div class="confirm-btns" id="conf-btns"></div>
  </div>
</div>
<input type="file" id="restore-file" accept=".json" style="display:none" onchange="doRestore(this)">

<script>
/* ── 날짜 ── */
/* ── 날짜 (로컬 시간 기준) ── */
const NOW = new Date();
const TODAY = `${NOW.getFullYear()}-${String(NOW.getMonth()+1).padStart(2,'0')}-${String(NOW.getDate()).padStart(2,'0')}`;
const TODAY_Y = NOW.getFullYear(), TODAY_M = NOW.getMonth(), TODAY_D = NOW.getDate(), TODAY_DOW = NOW.getDay();
function getMondayOf(d){const dt=new Date(toLocalDateStr(d instanceof Date?d:new Date(d))+'T12:00:00'),dow=dt.getDay(),diff=dow===0?-6:1-dow;dt.setDate(dt.getDate()+diff);return toLocalDateStr(dt);}
const THIS_WEEK_START = getMondayOf(NOW);
const DAYS_KO=['일','월','화','수','목','금','토'];
const MONTHS_EN=['January','February','March','April','May','June','July','August','September','October','November','December'];
const WD=['월','화','수','목','금','토','일'];

(function(){
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('hdr-dsub').textContent=`${days[TODAY_DOW]}, ${MONTHS_EN[TODAY_M]} ${TODAY_D} · ${TODAY_Y}`;
})();

/* ── localStorage 저장/불러오기 ── */
const STORE_KEY='schedule_app_v11';
function saveData(){try{localStorage.setItem(STORE_KEY,JSON.stringify({evs:S.evs,evChk:S.evChk,todos:S.todos,wks:S.wks,tbs:S.tbs,dr:S.dr,wr:S.wr,rch:S.rch,rchd:S.rchd||{},cats:S.cats}));}catch(e){}}
function loadData(){try{const raw=localStorage.getItem(STORE_KEY);if(!raw)return;const d=JSON.parse(raw);if(d.evs)S.evs=d.evs;if(d.evChk)S.evChk=d.evChk;if(d.todos)S.todos=d.todos;if(d.wks)S.wks=d.wks;if(d.tbs)S.tbs=d.tbs;if(d.dr)S.dr=d.dr;if(d.wr)S.wr=d.wr;if(d.rch)S.rch=d.rch;if(d.rchd)S.rchd=d.rchd;if(d.cats)S.cats=d.cats;}catch(e){}}

/* ── 백업 / 복원 ── */
function mBackup(){
  const now=new Date();
  const stamp=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
  showM(`<div class="mtl">백업 / 복원</div>
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:8px">
      <div style="background:var(--sf2);border-radius:10px;padding:14px">
        <div style="font-size:13px;font-weight:500;color:var(--tx);margin-bottom:4px">📤 내보내기 (백업)</div>
        <div style="font-size:12px;color:var(--tx2);margin-bottom:10px">현재 모든 데이터를 JSON 파일로 저장해요. 앱을 교체하기 전에 먼저 백업해두세요!</div>
        <button onclick="doBackup('${stamp}')" style="width:100%;padding:10px;border-radius:8px;border:none;background:var(--acc);color:#fff;font-size:13px;font-weight:500;cursor:pointer">파일로 내보내기</button>
      </div>
      <div style="background:var(--sf2);border-radius:10px;padding:14px">
        <div style="font-size:13px;font-weight:500;color:var(--tx);margin-bottom:4px">📥 불러오기 (복원)</div>
        <div style="font-size:12px;color:var(--tx2);margin-bottom:10px">이전에 저장한 JSON 파일을 선택하면 데이터가 복원돼요. 현재 데이터는 덮어씌워져요.</div>
        <button onclick="document.getElementById('restore-file').click()" style="width:100%;padding:10px;border-radius:8px;border:1px solid var(--bd);background:none;color:var(--tx2);font-size:13px;cursor:pointer">파일 선택해서 복원</button>
      </div>
    </div>
    <button class="bc" style="width:100%" onclick="closeM()">닫기</button>`);
}
function doBackup(stamp){
  const data={evs:S.evs,evChk:S.evChk,todos:S.todos,wks:S.wks,tbs:S.tbs,dr:S.dr,wr:S.wr,rch:S.rch,cats:S.cats};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=`schedule_backup_${stamp}.json`;
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
}
function doRestore(input){
  const file=input.files[0];if(!file)return;
  input.value=''; // reset
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const d=JSON.parse(e.target.result);
      // 유효성 체크
      if(!d.cats&&!d.evs){alert('올바른 백업 파일이 아니에요.');return;}
      showConfirm('데이터 복원','현재 데이터가 모두 덮어씌워져요. 계속할까요?',[
        {lb:'복원하기',cls:'cb-one',fn:()=>{
          if(d.evs)S.evs=d.evs;if(d.evChk)S.evChk=d.evChk;
          if(d.todos)S.todos=d.todos;if(d.wks)S.wks=d.wks;
          if(d.tbs)S.tbs=d.tbs;if(d.dr)S.dr=d.dr;
          if(d.wr)S.wr=d.wr;if(d.rch)S.rch=d.rch;
          if(d.cats)S.cats=d.cats;
          saveData();closeM();render();
          alert('복원 완료!');
        }},
        {lb:'취소',cls:'cb-cancel',fn:()=>{}},
      ]);
    }catch(err){alert('파일을 읽는 중 오류가 발생했어요.');}
  };
  reader.readAsText(file);
}

/* ── 유틸 ── */
function addDays(ds,n){const d=new Date(ds+'T12:00:00');d.setDate(d.getDate()+n);return toLocalDateStr(d);}
function gws(){return[...new Set([THIS_WEEK_START,...Object.keys(S.wks)])].sort()}
function cws(){const w=gws();return w[Math.max(0,Math.min(S.cwi,w.length-1))]||THIS_WEEK_START}
function ew(ws){
  if(!S.wks[ws])S.wks[ws]={goals:[],plan:{0:[],1:[],2:[],3:[],4:[],5:[],6:[]},actual:{0:[],1:[],2:[],3:[],4:[],5:[],6:[]},sleep:WD.map(d=>({dy:d,h:0}))};
  if(!S.wks[ws].sleep)S.wks[ws].sleep=WD.map(d=>({dy:d,h:0}));
  return S.wks[ws];
}
function gwd(ws,i){const d=new Date(ws+'T12:00:00');d.setDate(d.getDate()+i);return toLocalDateStr(d);}
function toLocalDateStr(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function wl(ws){const d=new Date(ws+'T12:00:00'),e=new Date(ws+'T12:00:00');e.setDate(e.getDate()+6);return`${d.getMonth()+1}/${d.getDate()} — ${e.getMonth()+1}/${e.getDate()}`}
function gc(id){return S.cats.find(c=>c.id===id)||{lb:id,co:'#C8C4A8'}}
function pm(s){if(!s)return 0;const[h,m]=s.split(':').map(Number);return h*60+m}
function dh(s,e){let d=pm(e)-pm(s);if(d<0)d+=1440;return Math.round(d/6)/10}
function fd(d){if(!d)return'';const t=new Date(d);return`${d===TODAY?'오늘 · ':''}${t.getMonth()+1}월 ${t.getDate()}일 ${DAYS_KO[t.getDay()]}요일`}
function dk(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return`rgb(${Math.max(0,r-70)},${Math.max(0,g-70)},${Math.max(0,b-70)})`}
function isLight(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return(r*299+g*587+b*114)/1000>160;}
function save(){saveData();}

/* ── fixed 팝업 (타임라인용 - overflow:hidden 탈출) ── */
let _fixPopup=null;
function togFix(id,e){
  e.stopPropagation();e.preventDefault();
  // 이미 열린 팝업이면 닫기
  if(_fixPopup){
    const prevId=_fixPopup.dataset.id;
    _fixPopup.remove();_fixPopup=null;
    if(prevId===id)return;
  }
  const btn=e.currentTarget;
  const rect=btn.getBoundingClientRect();
  const popup=document.createElement('div');
  popup.dataset.id=id;
  popup.style.cssText=`position:fixed;right:${Math.max(4,window.innerWidth-rect.right)}px;top:${rect.bottom+4}px;background:var(--sf);border:0.5px solid var(--bd);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:9999;min-width:88px;overflow:hidden`;
  // id에서 tbs id 추출하여 직접 함수 호출
  const tbId=parseInt(id.replace('km-tb-',''));
  popup.innerHTML=`<button style="display:block;width:100%;padding:9px 16px;font-size:13px;color:var(--tx);background:none;border:none;border-bottom:0.5px solid var(--bd);cursor:pointer;text-align:left" onmousedown="event.preventDefault();mETb(${tbId});closeFix()">수정</button>
    <button style="display:block;width:100%;padding:9px 16px;font-size:13px;color:#c0392b;background:none;border:none;cursor:pointer;text-align:left" onmousedown="event.preventDefault();dlTb(${tbId});closeFix()">삭제</button>`;
  document.body.appendChild(popup);
  _fixPopup=popup;
  setTimeout(()=>{
    document.addEventListener('click',function close(){closeFix();document.removeEventListener('click',close);},{once:true});
  },0);
}
function closeFix(){if(_fixPopup){_fixPopup.remove();_fixPopup=null;}}

  for(let i=0;i<sd;i++)cells.push({dy:pv-sd+1+i,cur:false,ds:''});
  for(let i=1;i<=dim;i++){const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(i).padStart(2,'0')}`;cells.push({dy:i,cur:true,ds});}
  while(cells.length%7)cells.push({dy:cells.length-sd-dim+1,cur:false,ds:''});
  let gr='';
  ['월','화','수','목','금','토','일'].forEach(d=>{gr+=`<div class="cdow">${d}</div>`});
  cells.forEach(({dy,cur,ds})=>{

      <div style="flex:1"><div style="font-size:13px;font-weight:500;color:var(--tx)">${e.nm}${hasRep?'<span style="font-size:9px;color:var(--tx3);margin-left:4px">반복</span>':''}</div>${e.mo?`<div style="font-size:11px;color:var(--tx2)">${e.mo}</div>`:''}</div>

        <button class="kdot" onclick="tog('${kid}',event)"><i></i><i></i><i></i></button>
        <div class="km" id="${kid}">
          <button onclick="kt(()=>mEE(${e.id}))">수정</button>
          <button class="red" onclick="kt(()=>askDelEv(${e.id}))">삭제</button>

  }).join(''):`<div style="font-size:12px;color:var(--tx2);padding:4px 0">등록된 일정이 없어요</div>`;
  return`<div style="background:var(--bg);padding-bottom:10px">
    <div class="cwrap">
      <div class="cnav"><span>${MONTHS_EN[m]} ${y}</span><div style="display:flex;gap:2px"><button onclick="pm1()">&#8249;</button><button onclick="nm1()">&#8250;</button></div></div>

      <div class="sdtl"><span>${fd(S.sd)}</span><button class="abtn" style="width:24px;height:24px;font-size:14px" onclick="mAE(null)">+</button></div>

  showConfirm('일정 삭제','반복 일정입니다. 어떻게 삭제할까요?',[

    {lb:'반복 전체 삭제',cls:'cb-all',fn:()=>{const rid=ev.repId;S.evs=S.evs.filter(e=>e.repId!==rid&&e.id!==id);save();render();}},

}

function rW(){
  const ws=cws(),wk=ew(ws);
  const isThisWeek=ws===THIS_WEEK_START;

  function planTotal(cid){let s=0;for(let i=0;i<7;i++)(wk.plan[i]||[]).forEach(b=>{if(b.ct===cid)s+=b.h;});return s;}
  function goalH(cid){return(wk.goals.find(g=>g.ct===cid)||{h:0}).h;}
  function actualFromTbs(cid){
    let s=0;
    for(let i=0;i<7;i++){
      const ds=gwd(ws,i);
      S.tbs.filter(b=>b.dt===ds&&b.ct===cid).forEach(b=>s+=dh(b.s,b.e));
    }
    return Math.round(s*10)/10;
  }
  function dayPlan(cid,i){return(wk.plan[i]||[]).filter(b=>b.ct===cid).reduce((s,b)=>s+b.h,0);}
  function dayActual(cid,i){
    const ds=gwd(ws,i);
    let s=0;
    S.tbs.filter(b=>b.dt===ds&&b.ct===cid).forEach(b=>s+=dh(b.s,b.e));
    return Math.round(s*10)/10;

    </div>

  </div>`;

  const planRows=wk.goals.map((g,gi)=>{
    const c=gc(g.ct);
    const planned=planTotal(g.ct);
    const remain=g.h-planned;
    const ov=planned>g.h;
    const sc=ov?'#c0392b':remain<=0?'var(--acc)':'var(--tx3)';
    const st=ov?`+${(planned-g.h).toFixed(1)}h 초과`:remain===0?'✓':`${remain.toFixed(1)}h`;
    const cells=WD.map((_,i)=>{
      const ds=gwd(ws,i);const isT=ds===TODAY;
      const pbl=(wk.plan[i]||[]).filter(b=>b.ct===g.ct);
      const p=pbl.reduce((s,b)=>s+b.h,0);
      // 배분 있으면 클릭 시 수정/삭제 메뉴, 없으면 추가
      if(p>0){
        const kid=`km-plan-${ws}-${i}-${g.ct}`;
        return`<div style="text-align:center;position:relative">
          <div class="kw" style="display:inline-block">
            <button onclick="tog('${kid}',event)" style="background:none;border:none;cursor:pointer;padding:2px 4px">

            </button>
            <div class="km" id="${kid}" style="left:50%;transform:translateX(-50%);right:auto;top:20px;z-index:100">
              <button onclick="kt(()=>mAB('plan',${i},'${ws}','${g.ct}'))">+ 추가</button>

          <div style="width:6px;height:6px;border-radius:50%;flex-shrink:0;background:${c.co}"></div>

        </div>
        <div style="font-size:9px;color:${sc};margin-top:1px;padding-left:9px">${g.h}h→<b>${st}</b></div>
      </div>
      ${cells}
    </div>`;
  }).join('');

  const planCard=hasGoals
    ?`${planRatioBar}${dayHeaders}${planRows}
      <button onclick="mAB('plan',-1,'${ws}',null)" style="width:100%;margin-top:8px;padding:6px;border:0.5px dashed var(--bd);border-radius:8px;background:none;font-size:11px;color:var(--tx2);cursor:pointer">+ 배분 추가</button>`
    :'<div style="font-size:12px;color:var(--tx2)">목표를 먼저 설정해보세요</div>';

  /* ── 카드 2: 실제 기록 (일일 탭 자동 반영) ── */
  // 이번 주 tbs에서 카테고리 추출
  const actCatIds=[...new Set(wk.goals.map(g=>g.ct))];
  for(let i=0;i<7;i++) S.tbs.filter(b=>b.dt===gwd(ws,i)).forEach(b=>{if(!actCatIds.includes(b.ct))actCatIds.push(b.ct);});
  const totalActual=actCatIds.reduce((s,cid)=>s+actualFromTbs(cid),0)||1;
  const hasActual=actCatIds.some(cid=>actualFromTbs(cid)>0);

  const actRatioBar=hasActual?`
    <div style="display:flex;height:9px;border-radius:5px;overflow:hidden;gap:1px;margin-bottom:5px">
      ${actCatIds.map(cid=>{const a=actualFromTbs(cid);return a>0?`<div style="flex:${a};background:${gc(cid).co}"></div>`:''}).join('')}
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px">
      ${actCatIds.map(cid=>{const c=gc(cid);const a=actualFromTbs(cid);return a>0?`<span style="display:flex;align-items:center;gap:3px;font-size:11px;color:var(--tx2)"><span style="width:7px;height:7px;border-radius:50%;background:${c.co};display:inline-block"></span>${c.lb} ${a}h</span>`:''}).join('')}
    </div>`:'';

  const actDayHeaders=`<div style="display:grid;grid-template-columns:72px repeat(7,1fr);margin-bottom:2px;border-bottom:0.5px solid var(--bd);padding-bottom:4px">
    <div style="font-size:10px;color:var(--tx3)">실제</div>
    ${WD.map((d,i)=>{const ds=gwd(ws,i);const isT=ds===TODAY;return`<div style="text-align:center;font-size:10px;font-weight:${isT?700:400};color:${isT?'var(--acc)':'var(--tx3)'}">${d}<br><span style="font-size:9px">${new Date(ds+'T12:00:00').getDate()}</span></div>`;}).join('')}
  </div>`;

  const actRows=actCatIds.map(cid=>{
    const c=gc(cid);
    const goal=goalH(cid);
    const actual=actualFromTbs(cid);
    const actPct=goal>0?Math.min(100,actual/goal*100):0;
    const ov=goal>0&&actual>goal;
    const sc=ov?'#c0392b':goal>0&&actual>=goal?'var(--acc)':'var(--tx2)';
    const st=goal>0?(ov?`+${(actual-goal).toFixed(1)}h`:actual>=goal?'✓':`${(goal-actual).toFixed(1)}h 남음`):`${actual}h`;
    const cells=WD.map((_,i)=>{
      const isT=gwd(ws,i)===TODAY;
      const a=dayActual(cid,i);
      return`<div style="text-align:center;font-size:10px;color:${isT?'var(--acc)':a>0?'var(--tx)':'var(--bd)'};font-weight:${a>0?500:400}">
        ${a>0?a+'h':'—'}
      </div>`;
    }).join('');
    return`<div style="display:grid;grid-template-columns:72px repeat(7,1fr);align-items:center;padding:5px 0;border-bottom:0.5px solid var(--sf2)">
      <div>
        <div style="display:flex;align-items:center;gap:3px">
          <div style="width:6px;height:6px;border-radius:50%;flex-shrink:0;background:${c.co}"></div>
          <span style="font-size:11px;font-weight:500;color:var(--tx)">${c.lb}</span>
        </div>
        ${goal>0?`<div style="font-size:9px;color:${sc};margin-top:1px;padding-left:9px">${actual}/${goal}h</div>`:`<div style="font-size:9px;color:var(--tx3);margin-top:1px;padding-left:9px">${actual}h</div>`}
      </div>
      ${cells}
    </div>`;
  }).join('');

  const actCard=hasActual
    ?`${actRatioBar}${actDayHeaders}${actRows}`
    :'<div style="font-size:12px;color:var(--tx2)">일일 탭에 시간 기록을 추가하면 자동으로 반영돼요</div>';

  const sl=(wk.sleep||[]).map((s,i)=>{const info=s.lb?s.lb:(s.s&&s.e?`${s.s}–${s.e} (${s.h}h)`:s.h>0?`${s.h}h`:'—');return`<div class="slrow"><div class="sld">${s.dy}</div><div class="slbw"><div class="slbf" style="width:${Math.min(100,s.h/10*100)}%"></div></div><div class="sli" onclick="mSlp('${ws}',${i})">${info} ✎</div></div>`;}).join('');

  return`<div class="wksec">
    <div class="wstrip"><button onclick="pvW()">&#8249;</button><span>${wl(ws)}${isThisWeek?' · 이번 주':''}</span><button onclick="nxW()">&#8250;</button></div>

    <div class="card">
      <div class="stl" style="margin-bottom:6px">
        <span style="display:flex;align-items:center;gap:6px">주간 계획 <button class="info-btn" onclick="toggleInfo(event)">i</button></span>
        <button class="abtn" style="width:24px;height:24px;font-size:14px" onclick="mWP()">✎</button>
      </div>
      <div class="info-popup" id="goal-info" style="font-size:11px">
        (24h - 수면 8h) × 7일 = <strong>112h</strong> | 알바 28h + 이동 5h + 식사 7h + 샤워 14h + 운동 5h = 59h <strong style="color:var(--acc)">자유 ≈ 53h</strong>
      </div>
      ${planCard}
    </div>

    <div class="card">
      <div class="stl" style="margin-bottom:6px">실제 기록 <span style="font-size:11px;font-weight:400;color:var(--tx2)">· 일일 탭 자동 반영</span></div>
      ${actCard}
    </div>

    <div class="card"><div class="stl">이번 주 수면</div>${sl}</div>
  </div>`;
}

/* ══ DAILY ══ */
const HOUR_PX=52; // 1시간 = 52px
function rD(){
  const ws=cws(),wDts=WD.map((_,i)=>gwd(ws,i));
  const si=Math.max(0,wDts.indexOf(S.sd)),sdy=WD[si],wk=ew(ws);
  const pills=WD.map((d,i)=>{const dt=new Date(wDts[i]);const isT=wDts[i]===TODAY;return`<div class="dp ${wDts[i]===S.sd?'active':''}" onclick="selDate('${wDts[i]}')"><span class="dn2" style="${isT&&wDts[i]!==S.sd?'color:var(--acc)':''}">${dt.getDate()}</span>${d}</div>`;}).join('');

  const etd=S.evs.filter(e=>e.dt===S.sd);
  const mtd=S.todos.filter(t=>t.dt===S.sd);
  const allTd=[...etd.map(e=>({id:e.id,tx:e.nm,dn:!!S.evChk[e.id+'_'+S.sd],ct:e.ct,isEv:true})),...mtd.map(t=>({...t,isEv:false}))];
  const tdH=allTd.length?allTd.map(t=>{
    const c=gc(t.ct);const fn=t.isEv?`tgEC(${t.id},'${S.sd}')`:`tgTd(${t.id})`;
    return`<div class="tit">
      <div class="chk ${t.dn?'done':''}" onclick="${fn}">${t.dn?'✓':''}</div>
      <div style="flex:1"><div style="font-size:13px;color:${t.dn?'var(--tx3)':'var(--tx)'};${t.dn?'text-decoration:line-through':''}">${t.tx}</div><div style="font-size:10px;color:${c.co}">${c.lb}${t.isEv?' · 먼슬리':''}</div></div>
      <div class="kw"><button class="kdot" onclick="tog('km-td-${t.id}',event)"><i></i><i></i><i></i></button>
        <div class="km" id="km-td-${t.id}">
          <button onclick="kt(()=>${t.isEv?`mEditEv(${t.id})`:`mEditTd(${t.id})`})">수정</button>
          ${!t.isEv?`<button class="red" onclick="kt(()=>dlTd(${t.id}))">삭제</button>`:''}
        </div>
      </div>
    </div>`;
  }).join(''):`<div style="font-size:12px;color:var(--tx2);padding:5px 0">할 일이 없어요</div>`;

  const pb=wk.plan[si]||[],pt=pb.reduce((s,b)=>s+b.h,0)||1;
  const pbs=pb.map(b=>`<div style="height:100%;width:${(b.h/pt*100).toFixed(1)}%;background:${gc(b.ct).co}"></div>`).join('');
  const plg=pb.map(b=>{const c=gc(b.ct);return`<div class="legit"><div class="legd" style="background:${c.co}"></div>${c.lb} ${b.h}h</div>`}).join('');

  const sb=S.tbs.filter(b=>b.dt===S.sd).sort((a,b)=>pm(a.s)-pm(b.s));
  const cm={};sb.forEach(b=>{const h=dh(b.s,b.e);cm[b.ct]=(cm[b.ct]||0)+h});
  const ut=Object.values(cm).reduce((s,v)=>s+v,0)||1;
  const ubs=S.cats.filter(c=>cm[c.id]).map(c=>`<div style="height:100%;width:${(cm[c.id]/ut*100).toFixed(1)}%;background:${c.co}"></div>`).join('');
  const ulg=S.cats.filter(c=>cm[c.id]).map(c=>`<div class="legit"><div class="legd" style="background:${c.co}"></div>${c.lb} ${cm[c.id].toFixed(1)}h</div>`).join('');

  // ── 타임라인 ──
  const DEF_START=7, DEF_END=24;
  let START_H=DEF_START, END_H=DEF_END;
  if(sb.length>0){
    const minH=Math.min(...sb.map(b=>Math.floor(pm(b.s)/60)));
    const maxHb=Math.max(...sb.map(b=>Math.ceil((pm(b.e)>pm(b.s)?pm(b.e):pm(b.e)+1440)/60)));
    START_H=Math.min(DEF_START,minH);
    END_H=Math.max(DEF_END,maxHb);
  }
  // 1시간 = 내역 3개 들어갈 높이 (각 내역 26px + 간격 2px = 28px × 3 + 여유 = 90px)
  const HOUR_H=90;
  const PX_PER_MIN=HOUR_H/60;
  const EV_H=26; // 단일 내역 높이 (한 줄: 타이틀+시간 인라인)

  // 1단계: 시간 비례 top/height 계산
  const layouts=[];
  sb.forEach(b=>{
    const bs=pm(b.s);
    const be=pm(b.e)>pm(b.s)?pm(b.e):pm(b.e)+1440;
    const top=(bs-START_H*60)*PX_PER_MIN;
    const height=Math.max(EV_H,(be-bs)*PX_PER_MIN);
    layouts.push({...b,top,height,bottom:top+height,bs,be,col:0});
  });

  // 2단계: 실제 시간 겹침 기준으로만 column 분할 (시각적 겹침 무시)
  layouts.forEach((a,i)=>{
    let col=0;
    while(layouts.slice(0,i).some(b=>b.col===col&&a.bs<b.be&&b.bs<a.be))col++;
    a.col=col;
  });
  const maxCol=layouts.length?Math.max(...layouts.map(l=>l.col))+1:1;

  // 3단계: 전체 높이
  const baseH=(END_H-START_H)*HOUR_H;
  const totalH=Math.max(baseH,...layouts.map(l=>l.bottom+8));

  // 시간 눈금 - 라벨 열과 이벤트 열 분리
  let hourLabelHtml='', hourLineHtml='';
  for(let h=START_H;h<=END_H;h++){
    const top=(h-START_H)*HOUR_H;
    hourLabelHtml+=`<div style="position:absolute;top:${top-7}px;right:0;font-size:10px;color:var(--tx3);line-height:1;white-space:nowrap">${String(h%24).padStart(2,'0')}:00</div>`;
    hourLineHtml+=`<div style="position:absolute;top:${top}px;left:0;right:0;height:0.5px;background:var(--bd)"></div>`;
  }

  // 이벤트 블록
  let evBlocks2='';
  layouts.forEach(b=>{
    const c=gc(b.ct);const kid=`km-tb-${b.id}`;
    const colW=100/maxCol;
    const tall=b.height>EV_H+6;
    evBlocks2+=`<div style="position:absolute;top:${b.top.toFixed(1)}px;height:${b.height.toFixed(1)}px;left:${(b.col*colW).toFixed(1)}%;width:${(colW-0.5).toFixed(1)}%;background:${c.co}22;border-left:2.5px solid ${c.co};border-radius:4px;padding:4px 6px;display:flex;align-items:flex-start;box-sizing:border-box;overflow:hidden">
      <div style="flex:1;min-width:0;overflow:hidden">
        ${tall
          ? `<div style="font-size:12px;font-weight:500;color:${dk(c.co)};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4">${b.nm}</div>
             <div style="font-size:10px;color:${dk(c.co)};opacity:.7;white-space:nowrap">${b.s}–${b.e}</div>`
          : `<div style="font-size:11px;font-weight:500;color:${dk(c.co)};white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.8">${b.nm}<span style="font-size:10px;font-weight:400;opacity:.65;margin-left:4px">${b.s}–${b.e}</span></div>`
        }
      </div>
      <button class="kdot" onclick="togFix('${kid}',event)" style="flex-shrink:0;margin-top:-1px"><i style="background:${dk(c.co)}99"></i><i style="background:${dk(c.co)}99"></i><i style="background:${dk(c.co)}99"></i></button>
    </div>`;
  });

  const tlHtml=`<div style="display:flex;margin-top:4px;gap:8px">
    <div style="width:38px;flex-shrink:0;position:relative;height:${totalH.toFixed(0)}px">${hourLabelHtml}</div>
    <div style="flex:1;position:relative;height:${totalH.toFixed(0)}px">${hourLineHtml}${evBlocks2}</div>
  </div>`;

  return`<div>
    <div class="wnb"><button onclick="pvW()">&#8249;</button><span>${wl(ws)}</span><button onclick="nxW()">&#8250;</button></div>
    <div class="dps">${pills}</div>
    <div style="background:var(--bg);padding-bottom:10px">
      <div class="tsec"><div class="stl">오늘 할 일 <button class="abtn" style="width:24px;height:24px;font-size:14px" onclick="mATd()">+</button></div>${tdH}</div>
      <div class="cbs"><div class="cbsl">카테고리 예상 (${sdy})</div><div class="urb" style="margin-bottom:4px">${pbs||`<div style="width:100%;height:100%;background:var(--sf2)"></div>`}</div><div class="leg">${plg||'<div style="font-size:11px;color:var(--tx2)">없음</div>'}</div></div>
      <div class="cbs" style="margin-top:0"><div class="cbsl">카테고리별 사용 시간</div><div class="urb" style="margin-bottom:4px">${ubs||`<div style="width:100%;height:100%;background:var(--sf2)"></div>`}</div><div class="leg">${ulg||'<div style="font-size:11px;color:var(--tx2)">기록 없음</div>'}</div></div>
      <div class="tlog">
        <div class="stl">시간 기록 <button class="abtn" style="width:24px;height:24px;font-size:14px" onclick="mATb()">+</button></div>
        ${tlHtml}
      </div>
    </div>
  </div>`;
}

/* ══ ROUTINE ══ */
function rR(){
  const all=[...S.dr,...S.wr],tot=all.length,done=all.filter(r=>r.on).length,pct=tot>0?Math.round(done/tot*100):0;
  const todayMonIdx=(TODAY_DOW+6)%7;
  const pts=WD.map((d,i)=>{const diff=i-todayMonIdx;const date=new Date(TODAY);date.setDate(date.getDate()+diff);const k=date.toISOString().split('T')[0];let p=0;if(i===todayMonIdx)p=pct;else if(S.rch[k])p=Math.round(S.rch[k].dn/Math.max(S.rch[k].tot,1)*100);return{d,p,isToday:i===todayMonIdx};});
  const svgW=320,svgH=44,pad=16;const plotW=svgW-pad*2,plotH=svgH-12;const xStep=plotW/6;
  const polyPts=pts.map((pt,i)=>`${pad+i*xStep},${svgH-12-(pt.p/100*plotH)}`).join(' ');
  const svgDots=pts.map((pt,i)=>{const cx=pad+i*xStep,cy=svgH-12-(pt.p/100*plotH);const filled=pt.p>0||pt.isToday;return`<circle cx="${cx}" cy="${cy}" r="${pt.isToday?4.5:3}" fill="${pt.isToday?'var(--acc)':(filled?'var(--acc)':'var(--bd)')}" />${pt.p>0?`<text x="${cx}" y="${cy-6}" text-anchor="middle" font-size="8" fill="var(--tx2)">${pt.p}%</text>`:''}<text x="${cx}" y="${svgH+1}" text-anchor="middle" font-size="9" fill="${pt.isToday?'var(--acc)':'var(--tx2)'}">${pt.d}</text>`;}).join('');
  const weekSVG=`<svg width="100%" viewBox="0 0 ${svgW} ${svgH+8}" xmlns="http://www.w3.org/2000/svg" style="overflow:visible"><polyline points="${polyPts}" fill="none" stroke="var(--acc)" stroke-width="1.5" stroke-opacity="0.4" stroke-linejoin="round"/>${svgDots}</svg>`;
  const mkR=(r,tp)=>{
    const isNweek=!!r.nweek;
    const cnt=r.wkCnt||0;
    const goal=r.nweek||0;
    const done=isNweek?cnt>=goal:r.on;
    const sub=isNweek
      ? `<div class="rd">주 ${goal}회 · 이번 주 ${cnt}회<span style="color:${done?'var(--acc)':'var(--tx3)'}"> ${done?'✓달성':'미달성'}</span></div>`
      : tp==='weekly'
        ? `<div class="rd">${r.dy}${r.t?' · '+r.t:''}</div>`
        : (r.t?`<div class="rd">${r.t}</div>`:'');
    const togFn=isNweek?`tgRNweek(${r.id})`:`tgR(${r.id},'${tp}')`;
    const onState=isNweek?(cnt>0):r.on;
    return`<div class="rrow">
      <button class="rtog ${onState?'on':''}" onclick="${togFn}">✓</button>
      <div style="flex:1;margin-left:10px">
        <div class="rn" style="${done?'color:var(--tx3);text-decoration:line-through':''}">${r.nm}</div>
        ${sub}
      </div>
      <button style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--tx3);padding:0 3px" onclick="eR(${r.id},'${tp}')">✎</button>
      <button style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--tx3);padding:0 3px" onclick="dR(${r.id},'${tp}')">✕</button>
    </div>`;
  };
  const dR2=S.dr.length?S.dr.map(r=>mkR(r,'daily')).join(''):`<div style="font-size:12px;color:var(--tx2);padding:8px 0">매일 루틴이 없어요</div>`;
  const wR2=S.wr.length?S.wr.map(r=>mkR(r,'weekly')).join(''):`<div style="font-size:12px;color:var(--tx2);padding:8px 0">요일별 루틴이 없어요</div>`;
  const{rcy,rcm}=S;const mn=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const foff=(new Date(rcy,rcm,1).getDay()+6)%7;const dmax=new Date(rcy,rcm+1,0).getDate();
  let cd='';for(let i=0;i<foff;i++)cd+=`<div></div>`;
  for(let d=1;d<=dmax;d++){
    const k=`${rcy}-${String(rcm+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const info=S.rch[k];const isT=k===TODAY;
    let bg=isT?'var(--acc)':'transparent',co=isT?'#fff':'var(--tx)',br='none';
    if(info){const pp=info.dn/info.tot;if(pp>=1){bg='var(--acc)';co='#fff';}else if(pp>0){bg='var(--accl)';co='var(--acc)';br='1px solid var(--acc)';}else{bg='var(--bd)';co='var(--tx2)';}}
    cd+=`<div style="text-align:center;padding:2px 0;cursor:pointer" onclick="showRchDay('${k}')"><div class="rcc" style="background:${bg};border:${br}"><span style="font-size:11px;color:${co}">${d}</span></div></div>`;
  }
  const dows=['월','화','수','목','금','토','일'].map(d=>`<div class="rcdow">${d}</div>`).join('');
  return`<div class="rsec">
    <div class="card"><div class="stl" style="margin-bottom:6px">오늘 달성률</div><div class="pct-row"><span class="pct-num">${pct}%</span><div class="pct-bar-wrap"><div class="pct-bar" style="width:${pct}%"></div></div><span class="pct-sub">${done}/${tot}</span></div></div>
    <div class="card"><div class="stl" style="margin-bottom:2px">이번 주 달성</div>${weekSVG}</div>
    <div class="card"><div class="stl">매일 루틴 <button class="abtn" style="width:24px;height:24px;font-size:14px" onclick="mAR('daily')">+</button></div>${dR2}</div>
    <div class="card"><div class="stl">요일별 루틴 <button class="abtn" style="width:24px;height:24px;font-size:14px" onclick="mAR('weekly')">+</button></div>${wR2}</div>
    <div class="card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><div class="stl" style="margin-bottom:0">루틴 캘린더</div><div style="display:flex;align-items:center;gap:2px"><button onclick="mvRC(-1)" style="background:none;border:none;cursor:pointer;font-size:16px;color:var(--tx2)">&#8249;</button><span style="font-size:12px;color:var(--tx)">${rcy}년 ${mn[rcm]}</span><button onclick="mvRC(1)" style="background:none;border:none;cursor:pointer;font-size:16px;color:var(--tx2)">&#8250;</button></div></div><div class="rcg">${dows}</div><div class="rcg">${cd}</div><div style="display:flex;gap:10px;margin-top:8px;font-size:10px;color:var(--tx2)"><div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:50%;background:var(--acc)"></div>전체 달성</div><div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:50%;background:var(--accl);border:1px solid var(--acc)"></div>부분 달성</div><div style="display:flex;align-items:center;gap:4px"><div style="width:8px;height:8px;border-radius:50%;background:var(--bd)"></div>미완료</div></div></div>
  </div>`;
}
function tgR(id,tp){const list=tp==='daily'?S.dr:S.wr;const r=list.find(x=>x.id===id);if(r)r.on=!r.on;_updRch();save();render();}
function tgRNweek(id){const r=S.wr.find(x=>x.id===id);if(!r||!r.nweek)return;r.wkCnt=(r.wkCnt||0)+1;if(r.wkCnt>r.nweek)r.wkCnt=0;_updRch();save();render();}
function _updRch(){
  const al=[...S.dr,...S.wr];
  const dn=al.filter(r=>r.nweek?((r.wkCnt||0)>=r.nweek):r.on).length;
  S.rch[TODAY]={dn,tot:al.length};
}
function dR(id,tp){if(tp==='daily')S.dr=S.dr.filter(r=>r.id!==id);else S.wr=S.wr.filter(r=>r.id!==id);save();render();}
function mvRC(d){S.rcm+=d;if(S.rcm>11){S.rcm=0;S.rcy++;}else if(S.rcm<0){S.rcm=11;S.rcy--;}render();}

function showRchDay(dt){
  // 날짜 표시 포맷
  const [y,m,day]=dt.split('-');
  const label=`${parseInt(m)}월 ${parseInt(day)}일`;
  const isToday=dt===TODAY;

  // 저장된 루틴 상태 불러오기 (없으면 오늘 상태 기준)
  const saved=S.rch[dt];
  // 각 루틴의 done 상태를 날짜별로 저장: S.rchd[dt] = {routineId: bool}
  if(!S.rchd)S.rchd={};
  if(!S.rchd[dt]){
    // 초기화: 오늘이면 현재 on 상태, 과거면 rch 정보 기반으로 추정
    S.rchd[dt]={};
    if(isToday){
      S.dr.forEach(r=>{S.rchd[dt][r.id]=r.on;});
      S.wr.forEach(r=>{S.rchd[dt][r.id]=r.on;});
    }
  }

  const allR=[...S.dr.map(r=>({...r,tp:'daily'})),...S.wr.map(r=>({...r,tp:'weekly'}))];

  function rows(){
    return allR.map(r=>{
      const done=isToday?r.on:!!(S.rchd[dt]&&S.rchd[dt][r.id]);
      const sub=r.tp==='weekly'?`<div style="font-size:10px;color:var(--tx2)">${r.dy}${r.t?' · '+r.t:''}</div>`:(r.t?`<div style="font-size:10px;color:var(--tx2)">${r.t}</div>`:'');
      return`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--bd)">
        <button onclick="tgRchDay('${dt}',${r.id},'${r.tp}')" style="width:22px;height:22px;border-radius:50%;border:1.5px solid ${done?'var(--acc)':'var(--tx3)'};background:${done?'var(--acc)':'transparent'};color:${done?'#fff':'transparent'};flex-shrink:0;cursor:pointer;font-size:11px">✓</button>
        <div style="flex:1">
          <div style="font-size:13px;color:${done?'var(--tx3)':'var(--tx)'};${done?'text-decoration:line-through':''}">${r.nm}</div>
          ${sub}
        </div>
      </div>`;
    }).join('');
  }

  showM(`<div class="mtl">${label} 루틴${isToday?' (오늘)':''}</div>
    <div id="rch-day-rows">${rows()}</div>
    <div class="mbr" style="margin-top:12px">
      <button class="bc" onclick="closeM()">닫기</button>
      <button class="bs" onclick="saveRchDay('${dt}')">저장</button>
    </div>`);
}

function tgRchDay(dt,id,tp){
  if(!S.rchd)S.rchd={};
  if(!S.rchd[dt])S.rchd[dt]={};
  const isToday=dt===TODAY;
  if(isToday){
    // 오늘은 실제 루틴 상태 직접 토글
    const list=tp==='daily'?S.dr:S.wr;
    const r=list.find(x=>x.id===id);
    if(r){r.on=!r.on;S.rchd[dt][id]=r.on;}
  } else {
    S.rchd[dt][id]=!S.rchd[dt][id];
  }
  // rch 업데이트
  const allR=[...S.dr,...S.wr];
  const done=Object.values(S.rchd[dt]||{}).filter(Boolean).length;
  S.rch[dt]={dn:done,tot:allR.length};
  // 모달 내 행만 갱신
  const container=document.getElementById('rch-day-rows');
  if(container){
    const [y,m,day]=dt.split('-');
    const label=`${parseInt(m)}월 ${parseInt(day)}일`;
    const isToday2=dt===TODAY;
    const allR2=[...S.dr.map(r=>({...r,tp:'daily'})),...S.wr.map(r=>({...r,tp:'weekly'}))];
    container.innerHTML=allR2.map(r=>{
      const dn=isToday2?r.on:!!(S.rchd[dt]&&S.rchd[dt][r.id]);
      const sub=r.tp==='weekly'?`<div style="font-size:10px;color:var(--tx2)">${r.dy}${r.t?' · '+r.t:''}</div>`:(r.t?`<div style="font-size:10px;color:var(--tx2)">${r.t}</div>`:'');
      return`<div style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--bd)">
        <button onclick="tgRchDay('${dt}',${r.id},'${r.tp}')" style="width:22px;height:22px;border-radius:50%;border:1.5px solid ${dn?'var(--acc)':'var(--tx3)'};background:${dn?'var(--acc)':'transparent'};color:${dn?'#fff':'transparent'};flex-shrink:0;cursor:pointer;font-size:11px">✓</button>
        <div style="flex:1">
          <div style="font-size:13px;color:${dn?'var(--tx3)':'var(--tx)'};${dn?'text-decoration:line-through':''}">${r.nm}</div>
          ${sub}
        </div>
      </div>`;
    }).join('');
  }
  save();
}

function saveRchDay(dt){
  if(!S.rchd)S.rchd={};
  const allR=[...S.dr,...S.wr];
  const isT=dt===TODAY;
  const done=isT?allR.filter(r=>r.on).length:Object.values(S.rchd[dt]||{}).filter(Boolean).length;
  S.rch[dt]={dn:done,tot:allR.length};
  save();closeM();render();
}

/* ══ MODALS ══ */
function showM(html){const mv=document.getElementById('mover');mv.classList.remove('hidden');mv.style.display='';document.getElementById('mc').innerHTML=`<div class="mhdl"></div>${html}`}
function closeM(){const mv=document.getElementById('mover');mv.classList.add('hidden');mv.style.display='none';}
document.getElementById('mover').addEventListener('click',e=>{if(e.target.id==='mover')closeM();});
function cch(ai){

  return chips+`<div class="ch" style="border-style:dashed;font-size:11px;padding:4px 8px" onclick="mCatMgr(document.querySelector('#cc .ch.active')?.dataset.v)">✎ 카테고리</div>`;

function pkCh(el,g){document.querySelectorAll(`#${g} .ch`).forEach(c=>c.classList.remove('active'));el.classList.add('active')}
function gch(g){return([...document.querySelectorAll(`#${g} .ch.active`)].map(c=>c.dataset.v)[0])||S.cats[0].id}

/* 카테고리 관리 미니 모달 */
let _catMgrFrom=null;

  function renderRows(){

          oninput="S.cats[${i}].co=this.value;save()">

          value="${c.lb}"
          oninput="S.cats[${i}].lb=this.value;save()">

    <div id="cat-rows">${renderRows()}</div>
    <button onclick="addCat()" style="width:100%;margin-top:8px;padding:9px;border:1px dashed var(--bd);border-radius:8px;background:none;font-size:12px;color:var(--tx2);cursor:pointer">+ 카테고리 추가</button>
    <div class="mbr" style="margin-top:8px">
      <button class="bc" onclick="closeM();render()">닫기</button>
      <button class="bs" onclick="save();closeM();render()">저장 완료</button>
    </div>`);

function addCat(){
  const newId='c'+Date.now();
  S.cats.push({id:newId,lb:'새 카테고리',co:'#C8D4D8'});
  save();mCatMgr(newId);
}
function delCat(id){
  if(S.cats.length<=1){alert('카테고리는 최소 1개 필요해요.');return;}
  if(!confirm('이 카테고리를 삭제할까요?\n해당 카테고리의 항목들은 첫 번째 카테고리로 이동돼요.'))return;
  S.cats=S.cats.filter(c=>c.id!==id);
  const fb=S.cats[0].id;
  S.evs.forEach(e=>{if(e.ct===id)e.ct=fb;});
  S.todos.forEach(t=>{if(t.ct===id)t.ct=fb;});
  S.tbs.forEach(b=>{if(b.ct===id)b.ct=fb;});
  Object.values(S.wks).forEach(wk=>{
    ['plan','actual'].forEach(k=>{Object.values(wk[k]||{}).forEach(arr=>{arr.forEach(b=>{if(b.ct===id)b.ct=fb;});});});
    if(wk.goals)wk.goals=wk.goals.filter(g=>g.ct!==id);
  });
  save();mCatMgr(fb);
}


/* 일정 추가 */
function mAE(pd){
  const dt=pd||S.sd;
  const rps=['없음','매주','매월','요일'].map((r,i)=>`<div class="ch ${i===0?'active':''}" onclick="pkRep(this,'${r}')" data-v="${r}">${r}</div>`).join('');
  const dc=WD.map(d=>`<div class="ch" onclick="this.classList.toggle('active')" data-v="${d}">${d}</div>`).join('');
  showM(`<div class="mtl">일정 추가</div>
    <input class="fi" id="en" placeholder="일정 이름">
    <div class="fr"><div><label class="flbl">시작일</label><input class="fi" id="es" type="date" value="${dt}" style="margin:0"></div><div><label class="flbl">종료일</label><input class="fi" id="ee" type="date" value="${dt}" style="margin:0"></div></div>
    <label class="flbl" style="margin-top:6px">카테고리</label><div class="cg" id="cc">${cch()}</div>
    <label class="flbl">반복</label><div class="cg" id="rc">${rps}</div>
    <div id="rpd" style="display:none;margin-bottom:8px"><label class="flbl">반복 요일</label><div class="cg" id="rdc">${dc}</div></div>
    <div id="rpu" style="display:none;margin-bottom:8px"><label class="flbl">반복 종료일</label><input class="fi" id="ru" type="date" value="${addDays(TODAY,180)}" style="margin:0"></div>
    <input class="fi" id="em" placeholder="메모 (선택)" style="margin-top:8px">
    <div class="mbr"><button class="bc" onclick="closeM()">취소</button><button class="bs" onclick="svE()">저장</button></div>`);
}
function pkRep(el,val){document.querySelectorAll('#rc .ch').forEach(c=>c.classList.remove('active'));el.classList.add('active');document.getElementById('rpu').style.display=val!=='없음'?'block':'none';document.getElementById('rpd').style.display=val==='요일'?'block':'none';}
function svE(){
  const nm=document.getElementById('en').value.trim();if(!nm)return;
  const sd=document.getElementById('es').value||S.sd,ed=document.getElementById('ee').value||sd;
  const until=document.getElementById('ru')?.value||addDays(TODAY,365);
  const ct=gch('cc'),rep=([...document.querySelectorAll('#rc .ch.active')].map(c=>c.dataset.v)[0])||'없음';
  const rd=[...document.querySelectorAll('#rdc .ch.active')].map(c=>c.dataset.v);
  const mo=document.getElementById('em').value;
  const dts=gnD(sd,ed,rep,rd,until);
  let nid=Math.max(0,...S.evs.map(e=>e.id))+1;
  const repId=rep!=='없음'?Date.now():null;
  dts.forEach(dt=>S.evs.push({id:nid++,nm,dt,ct,mo,repId}));
  save();closeM();render();
}
function gnD(sd,ed,rep,rd,until){
  const dw=['일','월','화','수','목','금','토'],lm=new Date(until);
  if(rep==='없음'){const d=[];let c=new Date(sd);const en=new Date(ed);while(c<=en){d.push(c.toISOString().split('T')[0]);c.setDate(c.getDate()+1);}return d;}
  if(rep==='매월'){const d=[],s=new Date(sd);for(let m2=s.getMonth();m2<24;m2++){const y2=s.getFullYear()+Math.floor(m2/12),m3=m2%12;const dt=new Date(y2,m3,s.getDate());if(dt<new Date(sd)||dt>lm)continue;d.push(dt.toISOString().split('T')[0]);}return d;}
  const d=[];let c=new Date(sd);while(c<=lm){const dow=dw[c.getDay()];if(rep==='매주'||(rep==='요일'&&rd.includes(dow)))d.push(c.toISOString().split('T')[0]);c.setDate(c.getDate()+1);}return d;
}

/* 카테고리 & 주간 목표 */
function mWP(){
  const ws=cws(),wk=ew(ws);
  // 카테고리 이름 기반 기본값 매핑
  const defaults={'수면':8,'알바':28,'이동':5,'식사':7,'샤워':14,'운동':5};
  function getDefault(lb){
    for(const [k,v] of Object.entries(defaults)){
      if(lb.includes(k))return v;
    }
    return 0;
  }
  const rows=S.cats.map((c,i)=>{
    const g=wk.goals.find(g=>g.ct===c.id);
    // 목표가 이미 있으면 그 값, 없으면 기본값
    const val=g?g.h:getDefault(c.lb);
    return`<div class="cer" id="ce-${i}"><input type="color" class="csw" value="${c.co}" id="cc-${i}" onchange="S.cats[${i}].co=this.value"><input class="cni" value="${c.lb}" id="cn-${i}"><div class="chw"><input type="number" class="chn" id="ch-${i}" value="${val}" min="0" max="99" step="0.5"><span style="font-size:11px;color:var(--tx2)">h</span></div><button class="dlb" onclick="this.closest('.cer').remove()">✕</button></div>`;
  }).join('');
  showM(`<div class="mtl">카테고리 & 주간 목표</div>
    <div style="font-size:11px;color:var(--tx2);margin-bottom:8px;padding:7px 10px;background:var(--sf2);border-radius:8px">수면 8h · 알바 28h · 이동 5h · 식사 7h · 샤워 14h · 운동 5h 기본 입력됨 (수정 가능)</div>
    <div id="cel">${rows}</div>
    <button onclick="aCR()" style="background:none;border:1px dashed var(--bd);border-radius:8px;width:100%;padding:7px;font-size:12px;color:var(--tx2);cursor:pointer;margin-top:6px">+ 카테고리 추가</button>
    <div class="mbr"><button class="bc" onclick="closeM()">취소</button><button class="bs" onclick="svWP()">저장</button></div>`);
}
let _nc=200;
function aCR(){_nc++;const i='n'+_nc;const row=document.createElement('div');row.className='cer';row.id='ce-'+i;row.dataset.isnew='1';row.innerHTML=`<input type="color" class="csw" value="#C8D4D8" id="cc-${i}"><input class="cni" id="cn-${i}" placeholder="카테고리명"><div class="chw"><input type="number" class="chn" id="ch-${i}" value="0" min="0" max="99" step="0.5"><span style="font-size:11px;color:var(--tx2)">h</span></div><button class="dlb" onclick="this.closest('.cer').remove()">✕</button>`;document.getElementById('cel').appendChild(row);}
function svWP(){
  const ws=cws();const rows=[...document.getElementById('cel').children];const nc=[],ng=[];
  rows.forEach(row=>{const i=row.id.replace('ce-','');const lb=document.getElementById('cn-'+i)?.value.trim();const co=document.getElementById('cc-'+i)?.value||'#C8C4A8';const h=parseFloat(document.getElementById('ch-'+i)?.value)||0;if(!lb)return;const isN=row.dataset.isnew;const id=isN?('c'+Date.now()+Math.random().toString(36).slice(2,4)):(S.cats[parseInt(i)]?.id||'c'+i);nc.push({id,lb,co});if(h>0)ng.push({ct:id,h});});
  S.cats=nc;ew(ws).goals=ng;save();closeM();render();
}

/* 블록 추가 - 요일 다중선택 + 남은 시간 표시 */
function mAB(dk2,di,ws,pc){
  const wk=ew(ws);
  function planTotal(cid){let s=0;for(let i=0;i<7;i++)(wk.plan[i]||[]).forEach(b=>{if(b.ct===cid)s+=b.h;});return s;}
  function actualTotal(cid){let s=0;for(let i=0;i<7;i++)(wk.actual[i]||[]).forEach(b=>{if(b.ct===cid)s+=b.h;});return s;}

  const firstCat=pc||S.cats[0]?.id;
  const co=S.cats.map(c=>{
    const goal=(wk.goals.find(g=>g.ct===c.id)||{h:0}).h;
    const used=dk2==='plan'?planTotal(c.id):actualTotal(c.id);
    const remain=Math.max(0,goal-used);
    const info=goal>0?` (${used.toFixed(1)}/${goal}h)`:'';
    return`<div class="ch ${c.id===firstCat?'active':''}" onclick="pkCh(this,'bcc');updBlkInfo('${dk2}','${ws}')" data-v="${c.id}">${c.lb}${info}</div>`;
  }).join('');

  const do2=di===-1?WD.map((d,i)=>`<div class="ch" onclick="this.classList.toggle('active')" data-v="${i}">${d}</div>`).join(''):null;

  const firstGoal=firstCat?(wk.goals.find(g=>g.ct===firstCat)||{h:0}).h:0;
  const firstUsed=firstCat?(dk2==='plan'?planTotal(firstCat):actualTotal(firstCat)):0;
  const firstRemain=Math.max(0,firstGoal-firstUsed);

  showM(`<div class="mtl">${dk2==='plan'?'예상 배분':'실제 기록'} 추가</div>
    ${di===-1?`<label class="flbl">요일 (다중선택 가능)</label><div class="cg" id="bdc">${do2}</div>`:'<div id="bdc" style="display:none"></div>'}
    <label class="flbl">카테고리</label><div class="cg" id="bcc">${co}</div>
    <div id="blk-info" style="background:var(--sf2);border-radius:8px;padding:8px 12px;margin-bottom:8px;font-size:12px;color:var(--tx2);display:${firstGoal>0?'flex':'none'};align-items:center;justify-content:space-between">
      <span>배분: <strong style="color:var(--tx)">${firstUsed.toFixed(1)}h</strong> / 목표: <strong style="color:var(--tx)">${firstGoal}h</strong></span>
      <span style="color:${firstRemain===0?'var(--acc)':firstRemain>0?'var(--tx2)':'#c0392b'};font-weight:500">${firstRemain>0?`${firstRemain.toFixed(1)}h 남음`:firstRemain===0?'꽉 참':'초과'}</span>
    </div>
    <label class="flbl">시간 (h)</label>
    <input class="fi" id="bh" type="number" value="${firstRemain>0?firstRemain.toFixed(1):1}" min=".5" step=".5">
    <div class="mbr"><button class="bc" onclick="closeM()">취소</button><button class="bs" onclick="svB('${dk2}',${di},'${ws}')">저장</button></div>`);
}
function updBlkInfo(dk2,ws){
  const wk=ew(ws);
  function planTotal(cid){let s=0;for(let i=0;i<7;i++)(wk.plan[i]||[]).forEach(b=>{if(b.ct===cid)s+=b.h;});return s;}
  function actualTotal(cid){let s=0;for(let i=0;i<7;i++)(wk.actual[i]||[]).forEach(b=>{if(b.ct===cid)s+=b.h;});return s;}
  const cid=([...document.querySelectorAll('#bcc .ch.active')].map(c=>c.dataset.v)[0])||'';
  const goal=(wk.goals.find(g=>g.ct===cid)||{h:0}).h;
  const used=dk2==='plan'?planTotal(cid):actualTotal(cid);
  const remain=Math.max(0,goal-used);
  const el=document.getElementById('blk-info');
  if(!el)return;
  if(goal>0){
    el.style.display='flex';
    el.innerHTML=`<span>배분: <strong style="color:var(--tx)">${used.toFixed(1)}h</strong> / 목표: <strong style="color:var(--tx)">${goal}h</strong></span><span style="color:${remain===0?'var(--acc)':remain>0?'var(--tx2)':'#c0392b'};font-weight:500">${remain>0?remain.toFixed(1)+'h 남음':remain===0?'꽉 참':'초과'}</span>`;
    const bh=document.getElementById('bh');if(bh&&remain>0)bh.value=remain.toFixed(1);
  } else {
    el.style.display='none';
  }
}
function svB(dk2,di,ws){
  const ct=gch('bcc');const h=parseFloat(document.getElementById('bh').value)||1;
  if(di===-1){
    // 다중 요일
    const days=[...document.querySelectorAll('#bdc .ch.active')].map(c=>parseInt(c.dataset.v));
    if(days.length===0)return;
    const wk=ew(ws);
    days.forEach(ri=>{if(!wk[dk2][ri])wk[dk2][ri]=[];wk[dk2][ri].push({ct,h});});
  } else {
    const wk=ew(ws);if(!wk[dk2][di])wk[dk2][di]=[];wk[dk2][di].push({ct,h});
  }
  save();closeM();render();
}

/* 수면 모달 - 밤샘/미정 버튼 */
function mSlp(ws,idx){
  const wk=ew(ws);const s=wk.sleep[idx]||{dy:WD[idx],h:0};
  showM(`<div class="mtl">${s.dy}요일 수면</div>
    <div class="sleep-special">
      <button class="sleep-sp-btn ${s.lb==='밤샘'?'active':''}" id="sp-allnight" onclick="setSleepSpecial('밤샘')">밤샘</button>
      <button class="sleep-sp-btn ${s.lb==='미정'?'active':''}" id="sp-unknown" onclick="setSleepSpecial('미정')">미정</button>
    </div>
    <div id="sleep-time-fields" style="${s.lb==='밤샘'||s.lb==='미정'?'opacity:.4;pointer-events:none':''}">
      <div class="fr" style="margin-bottom:0">
        <div><label class="flbl">취침</label><input class="fi" id="ss" type="time" value="${s.s||''}" oninput="cSl();clearSleepSpecial()" style="margin:0"></div>
        <div><label class="flbl">기상</label><input class="fi" id="se" type="time" value="${s.e||''}" oninput="cSl();clearSleepSpecial()" style="margin:0"></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin:8px 0;padding:8px 12px;background:var(--sf2);border-radius:8px">
        <span style="font-size:12px;color:var(--tx2)">수면 시간</span>
        <span id="sc" style="font-size:14px;font-weight:500;color:var(--tx);margin-left:auto">${s.h>0?s.h+'h':'—'}</span>
      </div>
    </div>
    <div class="mbr"><button class="bc" onclick="closeM()">취소</button><button class="bs" onclick="svSl('${ws}',${idx})">저장</button></div>`);
}
let _sleepSpecial=null;
function setSleepSpecial(v){
  _sleepSpecial=v;
  document.getElementById('sp-allnight').classList.toggle('active',v==='밤샘');
  document.getElementById('sp-unknown').classList.toggle('active',v==='미정');
  document.getElementById('sleep-time-fields').style.opacity='.4';
  document.getElementById('sleep-time-fields').style.pointerEvents='none';
}
function clearSleepSpecial(){
  _sleepSpecial=null;
  document.getElementById('sp-allnight').classList.remove('active');
  document.getElementById('sp-unknown').classList.remove('active');
  document.getElementById('sleep-time-fields').style.opacity='';
  document.getElementById('sleep-time-fields').style.pointerEvents='';
}
function cSl(){const ss=document.getElementById('ss')?.value,se=document.getElementById('se')?.value,el=document.getElementById('sc');if(!el||!ss||!se)return;let d=pm(se)-pm(ss);if(d<0)d+=1440;el.textContent=Math.round(d/6)/10+'h';}
function svSl(ws,idx){
  const wk=ew(ws);const ss=document.getElementById('ss').value,se=document.getElementById('se').value;
  const sp=_sleepSpecial;_sleepSpecial=null;
  let h=0;if(!sp&&ss&&se){let d=pm(se)-pm(ss);if(d<0)d+=1440;h=Math.round(d/6)/10;}
  wk.sleep[idx]={...wk.sleep[idx],s:sp?'':ss,e:sp?'':se,h:sp?0:h,lb:sp||undefined};
  save();closeM();render();
}

/* 할 일 / 시간기록 추가 */
function mATd(){showM(`<div class="mtl">할 일 추가</div><input class="fi" id="tdt" placeholder="할 일"><label class="flbl">카테고리</label><div class="cg" id="cc">${cch()}</div><div class="mbr"><button class="bc" onclick="closeM()">취소</button><button class="bs" onclick="svTd()">저장</button></div>`);}
function svTd(){const tx=document.getElementById('tdt').value.trim();if(!tx)return;const ct=gch('cc');S.todos.push({id:Date.now(),tx,dn:false,ct,dt:S.sd});save();closeM();render();}
function mATb(){showM(`<div class="mtl">시간 기록 추가</div><input class="fi" id="tbn" placeholder="활동명"><label class="flbl">시작</label><input class="fi" id="tbs" type="time" value="09:00"><label class="flbl">종료</label><input class="fi" id="tbe" type="time" value="10:00"><label class="flbl" style="margin-top:2px">카테고리</label><div class="cg" id="cc">${cch()}</div><div class="mbr"><button class="bc" onclick="closeM()">취소</button><button class="bs" onclick="svTb()">저장</button></div>`);}
function svTb(){const nm=document.getElementById('tbn').value.trim();if(!nm)return;const ct=gch('cc');S.tbs.push({id:Date.now(),nm,dt:S.sd,s:document.getElementById('tbs').value||'09:00',e:document.getElementById('tbe').value||'10:00',ct});save();closeM();render();}
function tgTd(id){const t=S.todos.find(t=>t.id===id);if(t)t.dn=!t.dn;save();render();}
function selDate(d){if(!d)return;S.sd=d;render()}
function pm1(){S.cm.m--;if(S.cm.m<0){S.cm.m=11;S.cm.y--}render()}
function nm1(){S.cm.m++;if(S.cm.m>11){S.cm.m=0;S.cm.y++}render()}
function pvW(){
  const cur=new Date(cws()+'T12:00:00');
  cur.setDate(cur.getDate()-7);
  const nw=toLocalDateStr(cur);
  ew(nw);
  S.cwi=gws().indexOf(nw);
  render();
}
function nxW(){
  const cur=new Date(cws()+'T12:00:00');
  cur.setDate(cur.getDate()+7);
  const nw=toLocalDateStr(cur);
  ew(nw);
  S.cwi=gws().indexOf(nw);
  render();
}

/* 루틴 모달 */
let _er=null,_ert='daily';

function mAR(tp){
  _er=null;_ert=tp||'daily';
  showM(`<div class="mtl">루틴 추가</div>
    <input class="fi" id="rn" placeholder="루틴 이름">
    <label class="flbl">종류</label>
    <div class="rtbr">
      <button class="rtb ${_ert==='daily'?'active':''}" id="rtd" onclick="pkRT('daily')">매일</button>
      <button class="rtb ${_ert==='weekly'?'active':''}" id="rtw" onclick="pkRT('weekly')">요일별</button>
      <button class="rtb ${_ert==='nweek'?'active':''}" id="rtn" onclick="pkRT('nweek')">주 N회</button>
    </div>
    <div id="rnd" style="display:${_ert==='weekly'?'block':'none'}"><input class="fi" id="rdy" placeholder="요일 (예: 월·수·금)"></div>
    <div id="rnn" style="display:${_ert==='nweek'?'flex':'none'};align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-size:13px;color:var(--tx)">주</span>
      <input class="fi" id="rnc" type="number" min="1" max="7" value="3" style="width:70px;margin:0;text-align:center">
      <span style="font-size:13px;color:var(--tx)">회 이상</span>
    </div>
    <div class="mbr"><button class="bc" onclick="closeM()">취소</button><button class="bs" onclick="svR()">저장</button></div>`);
}

function eR(id,tp){
  const list=tp==='daily'?S.dr:S.wr;
  const r=list.find(x=>x.id===id);if(!r)return;
  _er=id;_ert=tp;
  const actualTp=r.nweek?'nweek':tp;
  showM(`<div class="mtl">루틴 수정</div>
    <input class="fi" id="rn" value="${r.nm}">
    <label class="flbl">종류</label>
    <div class="rtbr">
      <button class="rtb ${actualTp==='daily'?'active':''}" id="rtd" onclick="pkRT('daily')">매일</button>
      <button class="rtb ${actualTp==='weekly'?'active':''}" id="rtw" onclick="pkRT('weekly')">요일별</button>
      <button class="rtb ${actualTp==='nweek'?'active':''}" id="rtn" onclick="pkRT('nweek')">주 N회</button>
    </div>
    <div id="rnd" style="display:${actualTp==='weekly'?'block':'none'}"><input class="fi" id="rdy" value="${r.dy||''}"></div>
    <div id="rnn" style="display:${actualTp==='nweek'?'flex':'none'};align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-size:13px;color:var(--tx)">주</span>
      <input class="fi" id="rnc" type="number" min="1" max="7" value="${r.nweek||3}" style="width:70px;margin:0;text-align:center">
      <span style="font-size:13px;color:var(--tx)">회 이상</span>
    </div>
    <div class="mbr"><button class="bc" onclick="closeM()">취소</button><button class="bs" onclick="svR()">저장</button></div>`);
  _ert=actualTp;
}

function pkRT(t){
  _ert=t;
  ['rtd','rtw','rtn'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.remove('active');});
  const map={daily:'rtd',weekly:'rtw',nweek:'rtn'};
  document.getElementById(map[t])?.classList.add('active');
  document.getElementById('rnd').style.display=t==='weekly'?'block':'none';
  document.getElementById('rnn').style.display=t==='nweek'?'flex':'none';
}

function svR(){
  const nm=document.getElementById('rn').value.trim();if(!nm)return;
  const dy=document.getElementById('rdy')?.value.trim()||'';
  const nc=parseInt(document.getElementById('rnc')?.value)||3;
  if(_er){
    const list=_ert==='daily'?S.dr:S.wr;
    const r=list.find(x=>x.id===_er);
    if(r){
      r.nm=nm;
      if(_ert==='weekly')r.dy=dy;
      if(_ert==='nweek'){r.nweek=nc;r.wkCnt=r.wkCnt||0;}
      else delete r.nweek;
    }
    _er=null;
  } else {
    const nid=Date.now();
    if(_ert==='daily') S.dr.push({id:nid,nm,on:false});
    else if(_ert==='weekly') S.wr.push({id:nid,nm,dy:dy||'매일',on:false});
    else S.wr.push({id:nid,nm,nweek:nc,wkCnt:0,on:false});
  }
  save();closeM();render();
}

document.getElementById('mab').onclick=()=>mAE(null);
render();
</script>
